<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment 2 Stimuli Sanity Check</title>

  <link href="./src/styles/experiment.css" rel="stylesheet" type="text/css" />
  <link href="./src/styles/air-quality-theme.css" rel="stylesheet" type="text/css" />

  <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 16px 40px;
      box-sizing: border-box;
    }

    .page h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
      color: #111827;
    }

    .page-subtitle {
      margin: 0;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.45;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .controls label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .controls select,
    .controls button {
      height: 34px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      padding: 0 10px;
      font-size: 13px;
      color: #111827;
      background: #ffffff;
    }

    .controls button {
      background: #374151;
      color: #ffffff;
      border-color: #374151;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:disabled {
      background: #9ca3af;
      border-color: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 13px;
      color: #4b5563;
    }

    .dataset-section {
      margin-top: 18px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .dataset-header {
      margin: 0 0 10px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .dataset-header h2 {
      margin: 0;
      font-size: 17px;
      color: #111827;
    }

    .dataset-header p {
      margin: 3px 0 0;
      font-size: 12px;
      color: #6b7280;
    }

    .stimuli-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(640px, 1fr));
      gap: 12px;
    }

    .stimulus-card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      background: #ffffff;
    }

    .stimulus-card h3 {
      margin: 0;
      font-size: 14px;
      color: #1f2937;
      line-height: 1.3;
    }

    .stimulus-card p {
      margin: 2px 0 8px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.35;
    }

    .visualization-panel {
      width: min(100%, 620px);
      max-width: 620px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      margin: 0 auto;
    }

    .visualization-content {
      width: 100%;
      min-width: 0;
      display: flex;
      justify-content: flex-start;
    }

    .chart-container {
      min-height: unset !important;
      width: 100%;
      box-sizing: border-box;
      padding: 8px !important;
      margin-bottom: 4px !important;
      margin-left: auto !important;
      margin-right: auto !important;
      position: relative;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: none;
    }

    .chart-container svg {
      display: block;
      margin: 0 auto;
    }

    .chart-container:hover {
      transform: none !important;
      box-shadow: none !important;
    }

    .organization-badge {
      display: inline-block;
      padding: 0.08em 0.55em;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 0.9em;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
      vertical-align: baseline;
    }

    .chart-organization-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 5;
      pointer-events: none;
    }

    .simple-chart-legend {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      padding: 1px 10px !important;
      border-top: 1px solid #e5e7eb;
      background: #f8f9fa;
      font-size: 13px;
    }

    .legend-line {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color-line {
      width: 20px;
      height: 3px;
      border-radius: 1px;
    }

    .legend-color-line.city-a {
      background-color: var(--city-a-color, #0891b2);
    }

    .legend-color-line.city-b {
      background-color: var(--city-b-color, #7c3aed);
    }

    .chart-instructions {
      padding: 2px 10px !important;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 1px;
      border-top: 1px solid #e5e7eb;
      background: #f8f9fa;
    }

    .chart-description-line,
    .chart-hint-line {
      font-size: 12px;
      line-height: 1.2;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-align: center;
    }

    .chart-description-line {
      color: #374151;
    }

    .chart-hint-line {
      color: #374151;
      font-style: italic;
    }

    @media (max-width: 720px) {
      .stimuli-grid {
        grid-template-columns: 1fr;
      }

      .simple-chart-legend {
        gap: 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Experiment 2 Stimuli Sanity Check</h1>
    <p class="page-subtitle">
      Renders all generated datasets (original + <code>_md5</code>) using the CI condition only, with the same ConditionFactory and Exp2Condition pipeline used in Experiment 2.
    </p>

    <div class="controls">
      <label for="version-select">Version:</label>
      <select id="version-select">
        <option value="even_hover">even_hover (CI + hover details)</option>
        <option value="odd_hover">odd_hover (CI + hover details)</option>
        <option value="even_click">even_click (CI + click details)</option>
        <option value="odd_click">odd_click (CI + click details)</option>
        <option value="even_static">even_static (CI + static details)</option>
        <option value="odd_static">odd_static (CI + static details)</option>
      </select>
      <button id="render-btn" type="button">Render CI for All Datasets</button>
    </div>

    <div id="status" class="status"></div>
    <div id="datasets-root"></div>
  </main>

  <script type="module" src="./stimuli_sanity_check.js"></script>
</body>
</html>
